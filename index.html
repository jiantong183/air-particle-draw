<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>隔空粒子手写 · 全屏</title>
<style>
  :root{ --bg-0:#05060c; --bg-1:#0b1024; --ink:#e8ecff; --muted:#7a83a8;
    --glass:rgba(18,22,44,.55); --glass-brd:rgba(140,160,255,.18); }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:var(--bg-0)}
  body{font-family:"PingFang SC","Hiragino Sans GB","Segoe UI",system-ui,sans-serif;color:var(--ink);touch-action:none}
  #stage{position:fixed;inset:0;z-index:0;background:radial-gradient(120% 80% at 50% -10%, #161d3e 0%, var(--bg-1) 38%, var(--bg-0) 100%)}
  /* 缩放视口：视频+所有画布一起变换，保证笔迹与人物对齐 */
  #viewport{position:fixed;inset:0;z-index:1;transform-origin:50% 50%;will-change:transform}
  #video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);display:none;background:#000}
  #video.on{display:block}
  #ink{position:absolute;inset:0;z-index:2;width:100%;height:100%;display:block;mix-blend-mode:screen}
  #draw{position:absolute;inset:0;z-index:3;width:100%;height:100%;display:block;mix-blend-mode:screen}
  #overlay{position:absolute;inset:0;z-index:4;width:100%;height:100%;display:block;mix-blend-mode:screen;pointer-events:none}

  .topbar{position:fixed;top:max(14px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);
    display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:18px;background:var(--glass);
    backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid var(--glass-brd);
    box-shadow:0 8px 40px rgba(0,0,0,.45);z-index:10;user-select:none}
  .brand{display:flex;align-items:center;gap:8px;padding-right:8px;border-right:1px solid var(--glass-brd)}
  .dot{width:9px;height:9px;border-radius:50%;background:linear-gradient(135deg,#ff5d8f,#7c5cff,#3ad7ff);box-shadow:0 0 12px #7c5cff}
  .brand b{font-size:14px;letter-spacing:.5px} .brand span{font-size:11px;color:var(--muted)}
  .swatches{display:flex;gap:7px;align-items:center}
  .sw{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.15s}
  .sw:hover{transform:scale(1.12)} .sw.active{border-color:#fff;transform:scale(1.18)}
  .btn{appearance:none;border:1px solid var(--glass-brd);background:rgba(255,255,255,.04);color:var(--ink);
    font-size:13px;font-weight:600;letter-spacing:.5px;padding:7px 13px;border-radius:12px;cursor:pointer;transition:.15s}
  .btn:hover{background:rgba(255,255,255,.12)} .btn:active{transform:scale(.94)}
  .btn.on{background:linear-gradient(135deg,rgba(124,92,255,.55),rgba(58,215,255,.35));color:#fff}
  .modebar{position:fixed;bottom:max(18px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
    display:flex;gap:6px;padding:6px;border-radius:16px;background:var(--glass);
    backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid var(--glass-brd);
    box-shadow:0 8px 40px rgba(0,0,0,.45);z-index:10}
  .mode{font-size:13px;font-weight:600;color:var(--muted);padding:8px 14px;border-radius:11px;cursor:pointer;transition:.15s}
  .mode.active{color:#fff;background:linear-gradient(135deg,rgba(124,92,255,.55),rgba(58,215,255,.35))}
  .zoombadge{position:fixed;right:14px;bottom:max(90px,calc(env(safe-area-inset-bottom) + 70px));z-index:10;
    font-size:12px;font-weight:700;color:#cdd6ff;background:var(--glass);border:1px solid var(--glass-brd);
    padding:6px 10px;border-radius:10px;backdrop-filter:blur(10px);opacity:0;transition:opacity .3s;pointer-events:none}
  .status{position:fixed;left:50%;top:max(70px,calc(env(safe-area-inset-top) + 56px));transform:translateX(-50%);
    z-index:8;font-size:13px;letter-spacing:.5px;color:#cdd6ff;text-align:center;transition:opacity .4s;pointer-events:none;
    background:rgba(8,10,24,.55);padding:7px 14px;border-radius:12px;backdrop-filter:blur(8px);max-width:90vw;line-height:1.6}
  .status b{color:#9fffce}
  .hint{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;z-index:6;transition:opacity .6s}
  .hint .big{font-size:clamp(24px,6.5vw,42px);font-weight:800;letter-spacing:2px;
    background:linear-gradient(120deg,#ff7eb3,#7c5cff,#3ad7ff);-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 24px rgba(124,92,255,.45));animation:float 3.4s ease-in-out infinite}
  .hint .sub{margin-top:12px;font-size:14px;color:#aab2d8;letter-spacing:1px;line-height:1.7}
  @keyframes float{0%,100%{transform:translateY(-6px)}50%{transform:translateY(6px)}}
  @media (max-width:520px){.brand span{display:none}.btn{padding:7px 10px}.mode{padding:8px 10px}}
</style>
</head>
<body>
  <div id="stage"></div>
  <div id="viewport">
    <video id="video" playsinline muted></video>
    <canvas id="ink"></canvas>
    <canvas id="draw"></canvas>
    <canvas id="overlay"></canvas>
  </div>

  <div class="topbar">
    <div class="brand"><span class="dot"></span><b>隔空粒子手写</b><span>· 全屏</span></div>
    <div class="swatches" id="swatches"></div>
    <button class="btn" id="camBtn">📷 摄像头</button>
    <button class="btn" id="clear">清空</button>
  </div>

  <div class="status" id="status"></div>
  <div class="zoombadge" id="zoombadge">1.00×</div>

  <div class="hint" id="hint">
    <div class="big">点「摄像头」开始隔空手写</div>
    <div class="sub">单手 食指+拇指 <b style="color:#9fffce">捏合落笔</b> · 松开抬笔<br><b style="color:#9fffce">双手</b> 同时出现 = 缩放镜头（分开放大 / 靠拢缩小）<br>想写字请用底部 <b style="color:#9fffce">「书写」</b> 模式，笔迹会留住</div>
  </div>

  <div class="modebar" id="modebar">
    <div class="mode active" data-mode="write">书写</div>
    <div class="mode" data-mode="trail">流光</div>
    <div class="mode" data-mode="bloom">绽放</div>
    <div class="mode" data-mode="comet">彗尾</div>
  </div>

<!-- MediaPipe Hands —— 与能用的第一版一致 -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
const cv=document.getElementById('draw'), ctx=cv.getContext('2d');
const ink=document.getElementById('ink'), ictx=ink.getContext('2d');
const ov=document.getElementById('overlay'), octx=ov.getContext('2d');
const viewport=document.getElementById('viewport');
let W,H,DPR;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2); W=innerWidth; H=innerHeight;
  let saved=null; try{saved=ictx.getImageData(0,0,ink.width,ink.height);}catch(e){}
  [cv,ink,ov].forEach(c=>{c.width=W*DPR;c.height=H*DPR;c.style.width=W+'px';c.style.height=H+'px';});
  ctx.setTransform(DPR,0,0,DPR,0,0); ictx.setTransform(DPR,0,0,DPR,0,0); octx.setTransform(DPR,0,0,DPR,0,0);
  if(saved){try{ictx.save();ictx.setTransform(1,0,0,1,0,0);ictx.putImageData(saved,0,0);ictx.restore();}catch(e){}}
}
resize(); addEventListener('resize',resize);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

/* 调色板 */
const PALETTES=[['#ff5d8f','#ff8fb3','#ffc2d6'],['#7c5cff','#a78bff','#d6c8ff'],
  ['#3ad7ff','#74e8ff','#bff4ff'],['#5cffb0','#9bffce','#d6ffe9'],
  ['#ffd76b','#ffe79b','#fff4cf'],['#ffffff','#dbe4ff','#aebfff']];
let palette=PALETTES[1];
const sw=document.getElementById('swatches');
PALETTES.forEach((p,i)=>{const el=document.createElement('div');el.className='sw'+(i===1?' active':'');
  el.style.background=`linear-gradient(135deg,${p[0]},${p[2]})`;
  el.onclick=()=>{palette=p;[...sw.children].forEach(c=>c.classList.remove('active'));el.classList.add('active');};
  sw.appendChild(el);});

/* 模式 */
let mode='write';
document.getElementById('modebar').addEventListener('click',e=>{const m=e.target.closest('.mode');if(!m)return;
  mode=m.dataset.mode;[...e.currentTarget.children].forEach(c=>c.classList.remove('active'));m.classList.add('active');});

const hint=document.getElementById('hint'); let hintGone=false;
function hideHint(){if(!hintGone){hintGone=true;hint.style.opacity='0';}}
const statusEl=document.getElementById('status');
function setStatus(t){statusEl.innerHTML=t;statusEl.style.opacity=t?'1':'0';}

/* ===== 缩放视口 ===== */
const view={scale:1,min:1,max:4};
const zoom={active:false,baseDist:0,baseScale:1};
const zb=document.getElementById('zoombadge'); let zbTimer=null;
function applyView(){
  viewport.style.transform='scale('+view.scale.toFixed(4)+')';
  zb.textContent=view.scale.toFixed(2)+'×'; zb.style.opacity='1';
  clearTimeout(zbTimer); zbTimer=setTimeout(()=>zb.style.opacity='0',1200);
}

/* 粒子 */
const particles=[]; const MAX=4500;
function rgba(hex,a){const n=parseInt(hex.slice(1),16);return`rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;}
function spawn(x,y,vx,vy){
  const col=palette[(Math.random()*palette.length)|0];
  let count,speed,life,size;
  if(mode==='trail'){count=2;speed=.6;life=70;size=2.2;}
  else if(mode==='bloom'){count=4;speed=2.4;life=55;size=2.6;}
  else if(mode==='comet'){count=3;speed=.3;life=90;size=1.8;}
  else{count=1;speed=.9;life=42;size=1.6;}
  for(let i=0;i<count;i++){
    if(particles.length>=MAX)particles.shift();
    const ang=Math.random()*Math.PI*2,spd=Math.random()*speed;
    particles.push({x,y,vx:(mode==='comet'?vx*.25:0)+Math.cos(ang)*spd,vy:(mode==='comet'?vy*.25:0)+Math.sin(ang)*spd,
      life:life+Math.random()*30,max:life+30,size:size+Math.random()*1.6,col});
  }
}

/* 平滑笔迹：二次贝塞尔曲线（经过各点中点） */
function strokePath(c,pts){
  if(pts.length===0) return;
  const col=palette[0];
  c.lineCap='round'; c.lineJoin='round'; c.globalCompositeOperation='source-over';
  if(pts.length===1){
    c.shadowBlur=16;c.shadowColor=col;c.fillStyle=col;
    c.beginPath();c.arc(pts[0].x,pts[0].y,3.5,0,Math.PI*2);c.fill();
    c.shadowBlur=0;c.fillStyle='rgba(255,255,255,.92)';
    c.beginPath();c.arc(pts[0].x,pts[0].y,1.6,0,Math.PI*2);c.fill();
    return;
  }
  const pass=(w,color,blur)=>{
    c.shadowBlur=blur;c.shadowColor=col;c.strokeStyle=color;c.lineWidth=w;
    c.beginPath();c.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<pts.length-1;i++){const mx=(pts[i].x+pts[i+1].x)/2,my=(pts[i].y+pts[i+1].y)/2;
      c.quadraticCurveTo(pts[i].x,pts[i].y,mx,my);}
    c.lineTo(pts[pts.length-1].x,pts[pts.length-1].y);
    c.stroke();
  };
  pass(7,col,16);                       // 外发光
  pass(2.6,'rgba(255,255,255,.92)',0);  // 白色亮芯
}

/* 坐标映射：归一化 → 全屏（cover + 镜像） */
function mapXY(nx,ny){
  const vw=video.videoWidth||640, vh=video.videoHeight||480;
  const scale=Math.max(W/vw,H/vh), dw=vw*scale, dh=vh*scale;
  const ox=(W-dw)/2, oy=(H-dh)/2;
  let sx=ox+nx*dw, sy=oy+ny*dh; sx=W-sx; return{x:sx,y:sy};
}

/* One Euro 滤波器：抑制手势抖动 */
function OneEuro(minCut,beta,dCut){
  let xp=null,dxp=0,tp=null;
  const a=(cut,dt)=>{const tau=1/(2*Math.PI*cut);return 1/(1+tau/dt);};
  return (x,t)=>{
    if(tp===null){tp=t;xp=x;return x;}
    let dt=(t-tp)/1000; if(!(dt>0))dt=1/60;
    const dx=(x-xp)/dt; const ad=a(dCut,dt); dxp=ad*dx+(1-ad)*dxp;
    const cut=minCut+beta*Math.abs(dxp); const ac=a(cut,dt);
    const xh=ac*x+(1-ac)*xp; xp=xh; tp=t; return xh;
  };
}
function makeEuro(){return OneEuro(1.6,0.03,1.0);}
let fx=makeEuro(), fy=makeEuro();

/* 统一落笔 */
const pen={x:0,y:0,active:false}; let strokePts=[];
function penDown(x,y){pen.x=x;pen.y=y;pen.active=true;strokePts=[{x,y}];hideHint();}
function penMove(x,y){
  if(!pen.active){penDown(x,y);return;}
  const dx=x-pen.x, dy=y-pen.y;
  if(mode==='write'){
    strokePts.push({x,y});
    if(Math.random()<0.5) spawn(x,y,dx*.3,dy*.3);
  }else{
    const d=Math.hypot(dx,dy),s=Math.max(1,d/4|0);
    for(let i=1;i<=s;i++) spawn(pen.x+dx*i/s,pen.y+dy*i/s,dx,dy);
  }
  pen.x=x;pen.y=y;
}
function penUp(){
  if(pen.active && mode==='write' && strokePts.length>0) strokePath(ictx,strokePts); // 烘焙到持久层
  pen.active=false; strokePts=[];
}

const cursor={x:0,y:0,show:false,pinch:false};
let handsLm=null, hadHand=false, pinchState=false, zoomFrames=0, drawGuard=0;
let camOn=false;
const CONN=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],
  [9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20],[0,17]];

function step(){
  ctx.globalCompositeOperation='source-over';
  ctx.fillStyle='rgba(0,0,0,0.18)'; ctx.fillRect(0,0,W,H);
  ctx.globalCompositeOperation='lighter';
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]; p.x+=p.vx;p.y+=p.vy;p.vx*=.96;p.vy*=.96;
    if(mode==='bloom')p.vy+=.012; p.life--;
    const t=Math.max(0,p.life/p.max);
    if(p.life<=0){particles.splice(i,1);continue;}
    const r=p.size*(mode==='bloom'?(0.4+t*0.9):t);
    const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,r*4);
    g.addColorStop(0,rgba(p.col,0.9*t));g.addColorStop(0.4,rgba(p.col,0.35*t));g.addColorStop(1,rgba(p.col,0));
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,p.y,r*4,0,Math.PI*2);ctx.fill();
  }
  octx.clearRect(0,0,W,H);
  if(camOn&&handsLm){
    for(const lm of handsLm){
      octx.lineWidth=2; octx.strokeStyle='rgba(120,170,255,.55)';
      for(const[a,b]of CONN){const A=mapXY(lm[a].x,lm[a].y),B=mapXY(lm[b].x,lm[b].y);
        octx.beginPath();octx.moveTo(A.x,A.y);octx.lineTo(B.x,B.y);octx.stroke();}
      octx.fillStyle='#9fffce';
      for(const id of[4,8]){const P=mapXY(lm[id].x,lm[id].y);octx.beginPath();octx.arc(P.x,P.y,5,0,Math.PI*2);octx.fill();}
    }
  }
  // 实时显示正在书写的平滑笔迹
  if(mode==='write'&&pen.active&&strokePts.length>0) strokePath(octx,strokePts);
  if(cursor.show){
    octx.beginPath();octx.arc(cursor.x,cursor.y,cursor.pinch?16:10,0,Math.PI*2);
    octx.strokeStyle=cursor.pinch?'rgba(159,255,206,.95)':'rgba(255,255,255,.55)';octx.lineWidth=2;octx.stroke();
  }
  requestAnimationFrame(step);
}
step();

/* 鼠标 / 触摸兜底（仅未开摄像头时） */
let drawing=false;
function pos(e){const t=e.touches?e.touches[0]:e;return{x:t.clientX,y:t.clientY};}
addEventListener('mousedown',e=>{if(camOn||e.target.closest('.topbar,.modebar'))return;drawing=true;const p=pos(e);penDown(p.x,p.y);cursor.show=true;cursor.x=p.x;cursor.y=p.y;});
addEventListener('mousemove',e=>{if(camOn||!drawing)return;const p=pos(e);cursor.x=p.x;cursor.y=p.y;penMove(p.x,p.y);});
addEventListener('mouseup',()=>{drawing=false;penUp();if(!camOn)cursor.show=false;});
addEventListener('touchstart',e=>{if(camOn||e.target.closest('.topbar,.modebar'))return;drawing=true;const p=pos(e);penDown(p.x,p.y);},{passive:false});
addEventListener('touchmove',e=>{if(camOn||!drawing)return;e.preventDefault();const p=pos(e);penMove(p.x,p.y);},{passive:false});
addEventListener('touchend',()=>{drawing=false;penUp();});
/* 滚轮缩放 + 双击复位 */
addEventListener('wheel',e=>{if(e.target.closest('.topbar,.modebar'))return;e.preventDefault();
  view.scale=clamp(view.scale*(e.deltaY<0?1.12:0.89),view.min,view.max);applyView();},{passive:false});
addEventListener('dblclick',e=>{if(e.target.closest('.topbar,.modebar'))return;view.scale=1;applyView();});
document.getElementById('clear').onclick=()=>{particles.length=0;ctx.clearRect(0,0,W,H);ictx.clearRect(0,0,W,H);pen.active=false;strokePts=[];};

/* ===== 摄像头 + MediaPipe Hands ===== */
const video=document.getElementById('video');
const camBtn=document.getElementById('camBtn');
let hands=null, camera=null;

function onResults(res){
  const hs=res.multiHandLandmarks;
  if(!hs || hs.length===0){
    handsLm=null;hadHand=false;pinchState=false;cursor.show=false;cursor.pinch=false;zoom.active=false;zoomFrames=0;penUp();
    setStatus('举起手，让食指对准镜头 ✋'); return;
  }
  hideHint(); handsLm=hs; const t=performance.now();
  const firstHand=!hadHand; hadHand=true;

  // 双手 → 缩放镜头
  if(hs.length>=2){
    zoomFrames++;
    penUp(); cursor.show=false; cursor.pinch=false; pinchState=false;
    const t0=hs[0][8], t1=hs[1][8];
    const nearEdge=p=>(p.x<0.04||p.x>0.96||p.y<0.04||p.y>0.96); // 指尖贴边 = 该手正在离开
    const A=mapXY(t0.x,t0.y), B=mapXY(t1.x,t1.y);
    const dist=Math.hypot(A.x-B.x,A.y-B.y);
    if(!zoom.active){ zoom.active=true; zoom.baseDist=dist; zoom.baseScale=view.scale; }
    else if(!nearEdge(t0) && !nearEdge(t1)){            // 任一手贴边则本帧不更新缩放
      let target=clamp(zoom.baseScale*(dist/Math.max(zoom.baseDist,1)),view.min,view.max);
      target=clamp(target, view.scale*0.8, view.scale*1.2);  // 每帧最多 ±20%，挡突跳
      view.scale+=0.4*(target-view.scale); applyView();
    }
    setStatus('🔍 双手缩放 '+view.scale.toFixed(2)+'×　双手分开放大 / 靠拢缩小');
    return;
  }

  // 单手 → 书写 / 绘画
  let resetFilter=firstHand;
  if(zoom.active){ zoom.active=false; resetFilter=true; penUp(); drawGuard=8; } // 从缩放干净退出：冻结倍率+防误画
  zoomFrames=0;
  if(resetFilter){ fx=makeEuro(); fy=makeEuro(); }

  const lms=hs[0];
  const raw=mapXY(lms[8].x,lms[8].y);
  const sx=fx(raw.x,t), sy=fy(raw.y,t);
  const dThumb=Math.hypot(lms[4].x-lms[8].x,lms[4].y-lms[8].y);
  const palm=Math.hypot(lms[0].x-lms[9].x,lms[0].y-lms[9].y)+1e-6;
  const ratio=dThumb/palm;
  if(!pinchState && ratio<0.50) pinchState=true;
  else if(pinchState && ratio>0.62) pinchState=false;
  let pinch=pinchState;
  if(drawGuard>0){ drawGuard--; pinch=false; pinchState=false; } // 退出缩放后的缓冲，避免杂线
  cursor.x=sx;cursor.y=sy;cursor.show=true;cursor.pinch=pinch;
  if(mode==='write') setStatus(pinch?'<b>书写中…</b> 笔迹会留住，「清空」擦除 ✍️':'捏合食指+拇指写字　·　双手可缩放镜头 🤏');
  else setStatus(pinch?'<b>落笔中…</b> 在空中画吧 ✨':'捏合食指+拇指开始画 🤏');
  if(pinch) penMove(sx,sy); else penUp();
}

async function startCam(){
  setStatus('正在加载手势模型…');
  try{
    if(!window.Hands) throw new Error('模型脚本未加载');
    hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
    hands.setOptions({maxNumHands:2,modelComplexity:0,minDetectionConfidence:.6,minTrackingConfidence:.6});
    hands.onResults(onResults);
    camera=new Camera(video,{onFrame:async()=>{await hands.send({image:video});},width:640,height:480});
    await camera.start();
    video.classList.add('on');
    camOn=true; camBtn.classList.add('on'); camBtn.textContent='📷 关闭'; drawing=false; hideHint();
    setStatus('单手捏合写字 · 双手缩放镜头 🤏');
  }catch(err){
    console.error(err);
    const s=String((err&&(err.message||err.name))||err);
    if(/NotAllowed|Permission|denied/i.test(s)) setStatus('⚠️ 摄像头权限被拒绝。点地址栏左侧的 🔒/📷 → 把「摄像头」设为「允许」→ 刷新页面再试。');
    else if(/NotFound|Devices/i.test(s)) setStatus('⚠️ 没检测到摄像头设备。');
    else if(/NotReadable|in use/i.test(s)) setStatus('⚠️ 摄像头被其他程序占用，关掉后再试。');
    else{ setStatus('⚠️ 摄像头打不开（'+s+'），可先用鼠标/手指直接写。'); setTimeout(()=>setStatus(''),5000); }
    camOn=false;
  }
}
function stopCam(){
  camOn=false; cursor.show=false; cursor.pinch=false; penUp(); handsLm=null; hadHand=false; zoom.active=false;
  try{camera&&camera.stop();}catch(e){}
  try{(video.srcObject?.getTracks()||[]).forEach(t=>t.stop());}catch(e){}
  video.classList.remove('on'); camBtn.classList.remove('on'); camBtn.textContent='📷 摄像头'; setStatus('');
}
camBtn.onclick=()=>{ camOn? stopCam(): startCam(); };
</script>
</body>
</html>
